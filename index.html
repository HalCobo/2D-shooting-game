<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
    <title>Touch 2D Shooting</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="hud">
        <div>Score: <span id="score">0</span></div>
        <div>Level: <span id="level">1</span></div>
      </header>
      <canvas id="game" width="900" height="600" aria-label="2D shooting game canvas"></canvas>
      <div class="lives" aria-label="残機"><span id="lives" class="lives-hearts">❤️❤️❤️❤️❤️</span></div>
      <section class="controls" aria-label="Game controls">
        <div id="stickArea" class="stick-area" role="presentation">
          <div id="stickKnob" class="stick-knob"></div>
        </div>
        <div class="skill-wrap">
          <button id="skillButton" class="skill-button" aria-label="skill">SKILL</button>
          <div id="skillCooldown" class="skill-cooldown">READY</div>
        </div>
      </section>
      <section id="overlay" class="overlay">
        <h1>2D Shooting Game</h1>
        <p id="controlHint">開始前に操作方式を選択してください。</p>
        <p>スマホ/タブレットは横向きプレイ推奨です。</p>
        <div class="mode-buttons">
          <button id="mobileModeButton" class="mode-btn">スマホ/タブレット操作</button>
          <button id="pcModeButton" class="mode-btn">PC操作（十字キー）</button>
        </div>
        <button id="startButton">ゲーム開始</button>
      </section>
    </main>
    <script src="game.js"></script>
  </body>
</html>
